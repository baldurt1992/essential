# Despliegue vía Plesk: el repo no tiene .git en httpdocs; Git y deploy corren en el servidor
# (bare + deploy.sh / hook de Plesk). Aquí solo comprobamos que el front compila y disparamos el webhook.
#
# Secreto: PLESK_WEBHOOK_URL (URL del webhook Git en Plesk para este repositorio).

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build frontend (verify)
        run: |
          npm ci
          npm run build

      - name: Trigger Plesk webhook
        env:
          WEBHOOK_URL: ${{ secrets.PLESK_WEBHOOK_URL }}
        run: |
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::error::Falta el secreto PLESK_WEBHOOK_URL en Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "Disparando webhook Plesk..."
          HTTP_CODE=$(curl -sS -o /tmp/webhook_body.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            --max-time 180)
          echo "HTTP $HTTP_CODE"
          cat /tmp/webhook_body.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
