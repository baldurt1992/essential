name: Deploy to Plesk

on:
  push:
    branches:
      - main

# Un solo job activo a la vez sobre main.
concurrency:
  group: deploy-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Comprueba que el front compila. Los archivos en public/build los genera Plesk tras git pull.
      - name: Build assets (verify)
        run: npm run build

      - name: Trigger Plesk webhook
        run: |
          echo "Triggering Plesk webhook..."
          HTTP_CODE=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.PLESK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            --max-time 30)

          echo "Webhook response code: $HTTP_CODE"
          echo "Webhook response body:"
          cat /tmp/webhook_response.txt

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Webhook triggered successfully"
          else
            echo "Warning: Webhook returned non-2xx status code: $HTTP_CODE"
            exit 1
          fi
