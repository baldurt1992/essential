# 1) Build de Vite en CI (mismo commit que el push).
# 2) Webhook Plesk: en el servidor hace pull bare → httpdocs, composer, migrate, deploy.sh (sin depender de .git en CI).
# 3) rsync: sube public/build del runner al servidor para que coincida EXACTAMENTE con el build del SHA del workflow.
#    Va DESPUÉS del webhook por si deploy.sh corre npm run build allí — el rsync deja los chunks de GitHub al final.
#
# Secretos:
#   PLESK_WEBHOOK_URL
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KNOWN_HOSTS
#   DEPLOY_SSH_PRIVATE_KEY (modo clave, por defecto) O variable DEPLOY_SSH_AUTH=password + secreto DEPLOY_SSH_PASSWORD
# Opcional: DEPLOY_PORT (default 22)
#
# DEPLOY_PATH debe ser la raíz del Laravel (donde están artisan y public/), la MISMA que usa el dominio en Plesk.
# Tras rsync, view:clear evita HTML cacheado con hashes viejos de @vite.

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DEPLOY_SSH_AUTH: ${{ vars.DEPLOY_SSH_AUTH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      - name: Trigger Plesk webhook
        env:
          WEBHOOK_URL: ${{ secrets.PLESK_WEBHOOK_URL }}
        run: |
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::error::Falta el secreto PLESK_WEBHOOK_URL"
            exit 1
          fi
          echo "Disparando webhook Plesk..."
          HTTP_CODE=$(curl -sS -o /tmp/webhook_body.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            --max-time 180)
          echo "HTTP $HTTP_CODE"
          cat /tmp/webhook_body.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi

      - name: Start SSH agent (rsync — modo clave)
        if: ${{ vars.DEPLOY_SSH_AUTH != 'password' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Instalar sshpass (rsync — modo contraseña)
        if: ${{ vars.DEPLOY_SSH_AUTH == 'password' }}
        run: sudo apt-get update -qq && sudo apt-get install -y sshpass

      - name: Configure known_hosts (rsync)
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Rsync public/build al servidor
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          for v in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
            eval "x=\$$v"
            if [ -z "${x:-}" ]; then
              echo "::error::Falta secreto $v para rsync"
              exit 1
            fi
          done
          PORT="${DEPLOY_PORT:-22}"
          echo "Rsync public/build/ → ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public/build/"
          if [ "${DEPLOY_SSH_AUTH:-key}" = "password" ]; then
            if [ -z "${SSHPASS:-}" ]; then
              echo "::error::Modo password: falta DEPLOY_SSH_PASSWORD y variable DEPLOY_SSH_AUTH=password en Actions → Variables"
              exit 1
            fi
            sshpass -e rsync -avz --delete \
              -e "ssh -p $PORT -o StrictHostKeyChecking=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
              public/build/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public/build/"
          else
            rsync -avz --delete \
              -e "ssh -p $PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
              public/build/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public/build/"
          fi

      - name: Laravel view:clear en servidor (relee manifest tras rsync)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSHPASS: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          RPATH=$(printf '%q' "$DEPLOY_PATH")
          if [ "${DEPLOY_SSH_AUTH:-key}" = "password" ]; then
            sshpass -e ssh -p "$PORT" -o StrictHostKeyChecking=yes -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd $RPATH && php artisan view:clear && echo '--- public/build/assets app chunks:' && ls -1 public/build/assets/app-*.js 2>/dev/null | head -5"
          else
            ssh -p "$PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "cd $RPATH && php artisan view:clear && echo '--- public/build/assets app chunks:' && ls -1 public/build/assets/app-*.js 2>/dev/null | head -5"
          fi
